services:
  - type: web
    name: karibu-groceries-ltd
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INIT_DIRECTOR_NAME
        sync: false
      - key: INIT_DIRECTOR_EMAIL
        sync: false
      - key: INIT_DIRECTOR_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: RATE_LIMIT_MAX
        value: "300"
      - key: LOGIN_RATE_LIMIT_MAX
        value: "10"
  - type: static
    name: karibu-groceries-ltd-frontend
    buildCommand: ""
    staticPublishPath: public
